version: "3.7"

services:
  verzay_app:
    image: ghcr.io/diazemanuel21/verzay-app:latest
    networks:
      - minha_rede
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=America/Bogota
      - AUTH_TRUST_HOST=true

      - AUTH_SECRET=CAMBIA_ESTE_VALOR
      - NEXTAUTH_URL=https://tu-dominio.com
      - DATABASE_URL=postgresql://USUARIO:PASSWORD@HOST:5432/BASE?schema=public

      - AUTH_RESEND_KEY=CAMBIA_ESTE_VALOR

      - AUTH_GOOGLE_ID=
      - AUTH_GOOGLE_SECRET=
      - AUTH_GITHUB_ID=
      - AUTH_GITHUB_SECRET=

      - S3_ACCESS_KEY=CAMBIA_ESTE_VALOR
      - S3_SECRET_KEY=CAMBIA_ESTE_VALOR
      - S3_ENDPOINT=medias3.verzay.co
      - S3_PUBLIC_URL=https://medias3.verzay.co
      - S3_BUCKET_NAME=verzay-media

      - OPENAI_API_KEY=CAMBIA_ESTE_VALOR
      - GOOGLE_API_KEY=CAMBIA_ESTE_VALOR

      - FOLLOW_UP_RUNNER_URL=
      - FOLLOW_UP_RUNNER_KEY=
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 4G
      labels:
        - traefik.enable=true
        - traefik.docker.network=minha_rede
        - traefik.http.routers.verzay_app.rule=Host(`tu-dominio.com`)
        - traefik.http.routers.verzay_app.entrypoints=websecure
        - traefik.http.routers.verzay_app.priority=1
        - traefik.http.routers.verzay_app.tls.certresolver=letsencryptresolver
        - traefik.http.routers.verzay_app.service=verzay_app
        - traefik.http.services.verzay_app.loadbalancer.server.port=3000
        - traefik.http.services.verzay_app.loadbalancer.passHostHeader=true

networks:
  minha_rede:
    name: minha_rede
    external: true
